<!-- Navigation -->
    <nav class="sticky top-0 z-50 glass border-b border-white/5 px-4 py-4">
        <div class="max-w-7xl mx-auto flex flex-col lg:flex-row items-center justify-between gap-6">
            <div class="flex items-center justify-between w-full lg:w-auto gap-10">
                <!-- Tambahkan WikiBawang. -->
                <h1 class="text-3xl font-extrabold tracking-tighter cursor-pointer group" onclick="WikiBawang.resetAndHome()">
                    <span class="gradient-text">WIKI</span><span class="text-white group-hover:text-blue-400 transition-colors">BAWANG</span>
                </h1>
                <div class="flex items-center gap-6">
                    <!-- Tambahkan WikiBawang. -->
                    <button onclick="WikiBawang.showFavorites(true)" class="text-xs font-bold uppercase tracking-[0.2em] text-slate-400 hover:text-pink-500 transition-all flex items-center gap-2">
                        <span class="text-lg">❤️</span> Favorites
                    </button>
                    <!-- Tambahkan WikiBawang. -->
                    <button onclick="WikiBawang.fetchRandomAnime()" class="text-xs font-bold uppercase tracking-[0.2em] text-slate-400 hover:text-yellow-400 transition-all flex items-center gap-2">
                        <span class="text-lg">🎲</span> Random
                    </button>
                </div>
            </div>
            
            <div class="relative w-full lg:max-w-md">
                <input type="text" id="searchInput" placeholder="Search anime (Type 1 char)..." autocomplete="off"
                    class="w-full bg-slate-900/50 text-sm text-white px-6 py-3.5 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500/50 border border-white/10 transition-all placeholder:text-slate-500">
                <div id="searchIndicator" class="absolute right-5 top-4 hidden">
                    <div class="w-4 h-4 border-2 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
                </div>
                <div id="suggestionBox" class="absolute top-full left-0 w-full glass mt-3 rounded-2xl hidden shadow-2xl z-[100] border border-white/10 overflow-hidden fade-in"></div>
            </div>
        </div>
    </nav>

    <main id="app" class="max-w-7xl mx-auto p-6 md:p-10 fade-in"></main>

    <!-- Pagination -->
    <div id="pagination" class="max-w-7xl mx-auto p-10 flex justify-center items-center gap-6 hidden pb-24">
        <!-- Tambahkan WikiBawang. -->
        <button id="prevBtn" onclick="WikiBawang.changePage(-1)" class="glass hover:bg-blue-600 px-8 py-3 rounded-2xl font-bold transition-all disabled:opacity-20 text-xs uppercase tracking-widest">Prev</button>
        <span id="pageInfo" class="text-blue-400 font-extrabold text-sm tracking-widest bg-blue-500/5 px-6 py-3 rounded-2xl border border-blue-500/20">PAGE 1</span>
        <!-- Tambahkan WikiBawang. -->
        <button id="nextBtn" onclick="WikiBawang.changePage(1)" class="glass hover:bg-blue-600 px-8 py-3 rounded-2xl font-bold transition-all text-xs uppercase tracking-widest">Next</button>
    </div>
